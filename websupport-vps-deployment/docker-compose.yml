name: nestjs-typesense

services:
  caddy:
    image: caddy:2.10.0-alpine
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    env_file:
      - .env.backend
    environment:
      NODE_ENV: production
      PORT: "8000"
      TYPESENSE_PROTOCOL: http
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: "8108"
    expose:
      - "8000"
    networks:
      - web
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      typesense:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s

  typesense:
    image: typesense/typesense:30.2
    restart: unless-stopped
    command:
      - "--data-dir=/data"
      - "--api-key=${TYPESENSE_API_KEY}"
      - "--listen-port=8108"
      - "--enable-cors=false"
    ports:
      - "127.0.0.1:8108:8108"
    volumes:
      - /srv/nestjs-typesense/data/typesense:/data
      - /srv/nestjs-typesense/data/typesense-snapshots:/snapshots
    networks:
      - web
    healthcheck:
      # typesense/typesense:30.2 has no wget/curl; bash /dev/tcp probes /health.
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8108 && printf \"GET /health HTTP/1.0\\r\\n\\r\\n\" >&3 && grep -q ok <&3'",
        ]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  web:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
