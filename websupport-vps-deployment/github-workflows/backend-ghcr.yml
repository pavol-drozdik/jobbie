name: backend-ghcr

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version tag to publish, for example 2026.06.03-1
        required: true
      skip_deploy:
        description: Skip automatic staging VPS deploy after push
        type: boolean
        default: false
  push:
    tags:
      - 'backend-v*'

permissions:
  contents: read
  packages: write

jobs:
  test-build-push:
    outputs:
      image: ${{ steps.tags.outputs.image }}
      version: ${{ steps.tags.outputs.version }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-ts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend-ts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: node scripts/ensure-playwright-browsers.cjs
        env:
          CI: true

      - name: Unit tests
        run: npm test

      - name: Build API
        run: npm run build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ -z "${VERSION}" ]]; then
            VERSION="${GITHUB_REF_NAME#backend-v}"
          fi
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${OWNER}/jobbie-backend" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: websupport-vps-deployment/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.version }}
            ${{ steps.tags.outputs.image }}:latest

  deploy-staging:
    name: Deploy backend to staging VPS
    needs: test-build-push
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.skip_deploy != 'true'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Resolve GHCR login user
        id: ghcr
        shell: bash
        run: |
          USER="${{ secrets.STAGING_GHCR_USER }}"
          if [[ -z "${USER}" ]]; then
            USER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          fi
          echo "user=${USER}" >> "${GITHUB_OUTPUT}"

      - name: Upload deploy script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: websupport-vps-deployment/scripts/deploy_backend.sh
          target: /tmp/jobbie-deploy/

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          BACKEND_VERSION: ${{ needs.test-build-push.outputs.version }}
          GHCR_IMAGE: ${{ needs.test-build-push.outputs.image }}
          GHCR_USER: ${{ steps.ghcr.outputs.user }}
          GHCR_TOKEN: ${{ secrets.STAGING_GHCR_TOKEN }}
          HEALTH_URL: ${{ vars.STAGING_HEALTH_URL }}
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: BACKEND_VERSION,GHCR_IMAGE,GHCR_USER,GHCR_TOKEN,HEALTH_URL
          script: |
            set -euo pipefail
            sudo install -m 755 /tmp/jobbie-deploy/websupport-vps-deployment/scripts/deploy_backend.sh \
              /srv/nestjs-typesense/scripts/deploy_backend.sh
            HEALTH_URL="${HEALTH_URL//$'\r'/}"
            HEALTH_URL="${HEALTH_URL//$'\n'/}"
            if [[ -z "${HEALTH_URL}" ]]; then
              APP_DOMAIN="$(grep -E '^APP_DOMAIN=' /srv/nestjs-typesense/.env | head -n1 | cut -d= -f2- | tr -d '"' | tr -d "'" | xargs || true)"
              APP_DOMAIN="${APP_DOMAIN//$'\r'/}"
              APP_DOMAIN="${APP_DOMAIN//$'\n'/}"
              if [[ -z "${APP_DOMAIN}" ]]; then
                echo "STAGING_HEALTH_URL unset and APP_DOMAIN missing in /srv/nestjs-typesense/.env" >&2
                exit 1
              fi
              export HEALTH_URL="https://${APP_DOMAIN}/health"
            else
              export HEALTH_URL="${HEALTH_URL}"
            fi
            sudo \
              BACKEND_VERSION="${BACKEND_VERSION}" \
              GHCR_IMAGE="${GHCR_IMAGE}" \
              GHCR_USER="${GHCR_USER}" \
              GHCR_TOKEN="${GHCR_TOKEN}" \
              HEALTH_URL="${HEALTH_URL}" \
              bash /srv/nestjs-typesense/scripts/deploy_backend.sh
