name: backend-ghcr

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version tag to publish, for example 2026.06.03-1
        required: true
  push:
    tags:
      - 'backend-v*'

permissions:
  contents: read
  packages: write

jobs:
  test-build-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-ts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend-ts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: node scripts/ensure-playwright-browsers.cjs
        env:
          CI: true

      - name: Unit tests
        run: npm test

      - name: Build API
        run: npm run build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ -z "${VERSION}" ]]; then
            VERSION="${GITHUB_REF_NAME#backend-v}"
          fi
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${OWNER}/jobbie-backend" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: websupport-vps-deployment/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.version }}
            ${{ steps.tags.outputs.image }}:latest
