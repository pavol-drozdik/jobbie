# Snippet for /etc/netdata/health_alarm_notify.conf
# Merge with stock file via: sudo /etc/netdata/edit-config health_alarm_notify.conf
# Never commit real webhook URLs to git.

SEND_EMAIL="NO"
SEND_DISCORD="YES"
DISCORD_WEBHOOK_URL="https://discord.com/api/webhooks/YOUR_ID/YOUR_TOKEN"

# sysadmin — resource alarms (health.d/jobbie.conf)
role_recipients[sysadmin]="discord"

# webmaster — httpcheck alarms (stock health.d/httpcheck.conf)
role_recipients[webmaster]="discord"
