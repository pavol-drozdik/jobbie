version: 2
updates:
  # Backend Nest API
  - package-ecosystem: npm
    directory: /backend-ts
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - backend
    groups:
      nest:
        patterns:
          - '@nestjs/*'
      stripe:
        patterns:
          - 'stripe'
    ignore:
      # TypeScript 6 needs a dedicated Nest/Vue toolchain pass; stay on 5.x.
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']

  # PWA (Nuxt)
  - package-ecosystem: npm
    directory: /app-pwa
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - frontend
    groups:
      tiptap:
        patterns:
          - '@tiptap/*'
      capacitor:
        patterns:
          - '@capacitor/*'
    ignore:
      # Capacitor 7/8 needs a dedicated migration; stay on 6.x until planned.
      - dependency-name: '@capacitor/*'
        update-types: ['version-update:semver-major']
      # TypeScript 6 needs a dedicated Nuxt/Vue toolchain pass; stay on 5.x.
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
