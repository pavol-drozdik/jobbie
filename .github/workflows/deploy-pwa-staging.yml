name: deploy-pwa-staging

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to build (branch, tag, or SHA; default staging tip)
        required: false
        default: staging
      pages_project:
        description: Override PWA_PAGES_PROJECT (leave empty to use staging environment var)
        required: false
        default: ''
      pages_branch:
        description: Override PWA_PAGES_BRANCH (leave empty to use staging environment var)
        required: false
        default: ''

permissions:
  contents: read

jobs:
  deploy:
    name: Rebuild and deploy PWA to staging
    uses: ./.github/workflows/pwa-cloudflare-deploy.yml
    with:
      environment: staging
      pages_project_override: ${{ github.event.inputs.pages_project }}
      pages_branch_override: ${{ github.event.inputs.pages_branch }}
      git_ref: ${{ github.event.inputs.git_ref }}
    secrets: inherit
