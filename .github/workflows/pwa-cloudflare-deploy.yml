# Reusable: build app-pwa (Cloudflare preset) and deploy dist/ via Wrangler.
# Pages project/branch come from GitHub Environment variables (see docs/staging-production-manual.md).
name: PWA Cloudflare deploy

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub deployment environment (staging | production)
        required: true
        type: string
      pages_project_override:
        description: Optional Cloudflare Pages project (overrides PWA_PAGES_PROJECT var)
        required: false
        type: string
        default: ''
      pages_branch_override:
        description: Optional Pages branch flag (overrides PWA_PAGES_BRANCH var)
        required: false
        type: string
        default: ''
      git_ref:
        description: Optional git ref to checkout (default = triggering ref)
        required: false
        type: string
        default: ''

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    name: Build and deploy PWA (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: app-pwa
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref != '' && inputs.git_ref || github.ref }}

      - name: Resolve Cloudflare Pages target
        id: cf
        shell: bash
        env:
          OVERRIDE_PROJECT: ${{ inputs.pages_project_override }}
          OVERRIDE_BRANCH: ${{ inputs.pages_branch_override }}
          VAR_PROJECT: ${{ vars.PWA_PAGES_PROJECT }}
          VAR_BRANCH: ${{ vars.PWA_PAGES_BRANCH }}
          DEPLOY_ENV: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          PROJECT="${OVERRIDE_PROJECT:-}"
          BRANCH="${OVERRIDE_BRANCH:-}"
          if [[ -z "${PROJECT}" ]]; then
            PROJECT="${VAR_PROJECT:-}"
          fi
          if [[ -z "${PROJECT}" ]]; then
            PROJECT="jobbie-pwa"
          fi
          if [[ -z "${BRANCH}" ]]; then
            BRANCH="${VAR_BRANCH:-}"
          fi
          echo "project=${PROJECT}" >> "${GITHUB_OUTPUT}"
          echo "branch=${BRANCH}" >> "${GITHUB_OUTPUT}"
          echo "Deploy env=${DEPLOY_ENV} project=${PROJECT} branch=${BRANCH:-<production deploy>}"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: app-pwa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Build for Cloudflare Pages
        run: npm run build:cloudflare
        env:
          NUXT_PUBLIC_API_BASE_URL: ${{ vars.NUXT_PUBLIC_API_BASE_URL }}
          NUXT_PUBLIC_SITE_URL: ${{ vars.NUXT_PUBLIC_SITE_URL }}
          NUXT_PUBLIC_ALLOW_INDEXING: ${{ vars.NUXT_PUBLIC_ALLOW_INDEXING }}
          NUXT_PUBLIC_LEGAL_PUBLISHED: ${{ vars.NUXT_PUBLIC_LEGAL_PUBLISHED }}
          NUXT_PUBLIC_BRAND_NAME: ${{ vars.NUXT_PUBLIC_BRAND_NAME }}
          NUXT_PUBLIC_BRAND_ALTERNATE_NAME: ${{ vars.NUXT_PUBLIC_BRAND_ALTERNATE_NAME }}
          NUXT_PUBLIC_SUPPORT_EMAIL: ${{ vars.NUXT_PUBLIC_SUPPORT_EMAIL }}
          NUXT_PUBLIC_SUPPORT_PHONE: ${{ vars.NUXT_PUBLIC_SUPPORT_PHONE }}
          NUXT_PUBLIC_SOCIAL_INSTAGRAM_URL: ${{ vars.NUXT_PUBLIC_SOCIAL_INSTAGRAM_URL }}
          NUXT_PUBLIC_SOCIAL_FACEBOOK_URL: ${{ vars.NUXT_PUBLIC_SOCIAL_FACEBOOK_URL }}
          NUXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ vars.NUXT_PUBLIC_GOOGLE_SITE_VERIFICATION }}
          NUXT_PUBLIC_BING_SITE_VERIFICATION: ${{ vars.NUXT_PUBLIC_BING_SITE_VERIFICATION }}
          NUXT_PUBLIC_INDEXNOW_KEY: ${{ vars.NUXT_PUBLIC_INDEXNOW_KEY }}
          NUXT_PUBLIC_CDN_URL: ${{ vars.NUXT_PUBLIC_CDN_URL }}
          NUXT_PUBLIC_MEDIA_CDN_URL: ${{ vars.NUXT_PUBLIC_MEDIA_CDN_URL }}
          NUXT_PUBLIC_SUPABASE_URL: ${{ vars.NUXT_PUBLIC_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NUXT_PUBLIC_SUPABASE_ANON_KEY }}
          NUXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ vars.NUXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NUXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NUXT_PUBLIC_TURNSTILE_SITE_KEY }}
          NUXT_PUBLIC_WEB_VITALS_SAMPLE_RATE: ${{ vars.NUXT_PUBLIC_WEB_VITALS_SAMPLE_RATE }}
          NUXT_PUBLIC_AUDIT_CLIENT_EVENTS: ${{ vars.NUXT_PUBLIC_AUDIT_CLIENT_EVENTS }}
          NUXT_PUBLIC_AUDIT_CLIENT_SAMPLE_RATE: ${{ vars.NUXT_PUBLIC_AUDIT_CLIENT_SAMPLE_RATE }}
          NUXT_PUBLIC_SENTRY_DSN: ${{ vars.NUXT_PUBLIC_SENTRY_DSN }}
          NUXT_PUBLIC_SENTRY_ENVIRONMENT: ${{ vars.NUXT_PUBLIC_SENTRY_ENVIRONMENT }}
          NUXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE: ${{ vars.NUXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE }}
          NUXT_PUBLIC_POSTHOG_KEY: ${{ vars.NUXT_PUBLIC_POSTHOG_KEY }}
          NUXT_PUBLIC_POSTHOG_HOST: ${{ vars.NUXT_PUBLIC_POSTHOG_HOST }}
          NUXT_PUBLIC_POSTHOG_DEFAULTS: ${{ vars.NUXT_PUBLIC_POSTHOG_DEFAULTS }}
          NUXT_PUBLIC_GTM_CONTAINER_ID: ${{ vars.NUXT_PUBLIC_GTM_CONTAINER_ID }}

      - name: Deploy to Cloudflare Pages
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          BRANCH_ARG=""
          if [[ -n "${{ steps.cf.outputs.branch }}" ]]; then
            BRANCH_ARG="--branch=${{ steps.cf.outputs.branch }}"
          fi
          npx wrangler@3 pages deploy dist \
            --project-name="${{ steps.cf.outputs.project }}" \
            ${BRANCH_ARG} \
            --no-bundle

      - name: Purge Cloudflare zone cache
        shell: bash
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          set -euo pipefail
          if [[ -z "${CLOUDFLARE_ZONE_ID:-}" ]]; then
            echo "CLOUDFLARE_ZONE_ID not set — skipping zone cache purge"
            exit 0
          fi
          resp=$(curl -sf -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$resp"
          echo "$resp" | jq -e '.success == true' >/dev/null
