name: backend-ghcr

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional image tag (auto date-SHA when empty)
        required: false
      skip_deploy:
        description: Skip VPS deploy after build (staging or production)
        type: boolean
        default: false
  push:
    branches:
      - staging
      - main
    tags:
      - 'backend-v*'
    paths:
      - 'backend-ts/**'
      - 'websupport-vps-deployment/**'
      - '.github/workflows/backend-ghcr.yml'

permissions:
  contents: read
  packages: write

concurrency:
  group: backend-ghcr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test-build-push:
    outputs:
      image: ${{ steps.tags.outputs.image }}
      version: ${{ steps.tags.outputs.version }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-ts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend-ts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: node scripts/ensure-playwright-browsers.cjs
        env:
          CI: true

      - name: Unit tests
        run: npm test

      - name: Build API
        run: npm run build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        shell: bash
        run: |
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER}/jobbie-backend"
          INPUT_VERSION="${{ github.event.inputs.version }}"

          if [[ -n "${INPUT_VERSION}" ]]; then
            VERSION="${INPUT_VERSION}"
          elif [[ "${GITHUB_REF}" == refs/tags/backend-v* ]]; then
            VERSION="${GITHUB_REF_NAME#backend-v}"
          elif [[ "${GITHUB_REF}" == refs/heads/staging ]]; then
            VERSION="staging-$(date -u +%Y.%m.%d)-${GITHUB_SHA:0:7}"
          else
            VERSION="$(date -u +%Y.%m.%d)-${GITHUB_SHA:0:7}"
          fi

          PUSH_LATEST=false
          if [[ "${GITHUB_REF}" == refs/heads/main ]] || [[ "${GITHUB_REF}" == refs/tags/backend-v* ]]; then
            PUSH_LATEST=true
          fi

          {
            echo "image=${IMAGE}"
            echo "version=${VERSION}"
            echo "push_latest=${PUSH_LATEST}"
            echo "docker_tags<<EOF"
            echo "${IMAGE}:${VERSION}"
            if [[ "${PUSH_LATEST}" == "true" ]]; then
              echo "${IMAGE}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Resolve Docker platforms
        id: platforms
        shell: bash
        run: |
          # Staging VPS is ARM64 — skip amd64 to halve build time and flaky QEMU npm installs.
          if [[ "${GITHUB_REF}" == refs/heads/staging ]]; then
            echo "list=linux/arm64" >> "${GITHUB_OUTPUT}"
          else
            echo "list=linux/amd64,linux/arm64" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: websupport-vps-deployment/Dockerfile
          platforms: ${{ steps.platforms.outputs.list }}
          push: true
          tags: ${{ steps.tags.outputs.docker_tags }}

  deploy-staging:
    name: Deploy backend to staging VPS
    needs: test-build-push
    if: >
      needs.test-build-push.result == 'success' &&
      (github.ref == 'refs/heads/staging' || startsWith(github.ref, 'refs/tags/backend-v')) &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_deploy != 'true')
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Resolve GHCR login user
        id: ghcr
        shell: bash
        run: |
          USER="${{ secrets.STAGING_GHCR_USER }}"
          if [[ -z "${USER}" ]]; then
            USER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          fi
          echo "user=${USER}" >> "${GITHUB_OUTPUT}"

      - name: Upload deploy artifacts
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: "websupport-vps-deployment/scripts/deploy_backend.sh,websupport-vps-deployment/docker-compose.yml"
          target: /tmp/jobbie-deploy/

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          BACKEND_VERSION: ${{ needs.test-build-push.outputs.version }}
          GHCR_IMAGE: ${{ needs.test-build-push.outputs.image }}
          GHCR_USER: ${{ steps.ghcr.outputs.user }}
          GHCR_TOKEN: ${{ secrets.STAGING_GHCR_TOKEN }}
          HEALTH_URL: ${{ vars.STAGING_HEALTH_URL }}
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: BACKEND_VERSION,GHCR_IMAGE,GHCR_USER,GHCR_TOKEN,HEALTH_URL
          script: |
            set -euo pipefail
            sudo install -m 755 /tmp/jobbie-deploy/websupport-vps-deployment/scripts/deploy_backend.sh \
              /srv/nestjs-typesense/scripts/deploy_backend.sh
            sudo install -m 644 /tmp/jobbie-deploy/websupport-vps-deployment/docker-compose.yml \
              /srv/nestjs-typesense/docker-compose.yml
            HEALTH_URL="${HEALTH_URL//$'\r'/}"
            HEALTH_URL="${HEALTH_URL//$'\n'/}"
            if [[ -z "${HEALTH_URL}" ]]; then
              APP_DOMAIN="$(sudo grep -E '^APP_DOMAIN=' /srv/nestjs-typesense/.env | head -n1 | cut -d= -f2- | tr -d '"' | tr -d "'" | xargs || true)"
              APP_DOMAIN="${APP_DOMAIN//$'\r'/}"
              APP_DOMAIN="${APP_DOMAIN//$'\n'/}"
              if [[ -z "${APP_DOMAIN}" ]]; then
                echo "STAGING_HEALTH_URL unset and APP_DOMAIN missing in /srv/nestjs-typesense/.env" >&2
                exit 1
              fi
              export HEALTH_URL="https://${APP_DOMAIN}/health"
            else
              export HEALTH_URL="${HEALTH_URL}"
            fi
            sudo \
              BACKEND_VERSION="${BACKEND_VERSION}" \
              GHCR_IMAGE="${GHCR_IMAGE}" \
              GHCR_USER="${GHCR_USER}" \
              GHCR_TOKEN="${GHCR_TOKEN}" \
              HEALTH_URL="${HEALTH_URL}" \
              bash /srv/nestjs-typesense/scripts/deploy_backend.sh

  deploy-production:
    name: Deploy backend to production VPS
    needs: test-build-push
    if: >
      needs.test-build-push.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_deploy != 'true')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Resolve GHCR login user
        id: ghcr
        shell: bash
        run: |
          USER="${{ secrets.PROD_GHCR_USER }}"
          if [[ -z "${USER}" ]]; then
            USER="${{ secrets.STAGING_GHCR_USER }}"
          fi
          if [[ -z "${USER}" ]]; then
            USER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          fi
          echo "user=${USER}" >> "${GITHUB_OUTPUT}"

      - name: Upload deploy artifacts
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "websupport-vps-deployment/scripts/deploy_backend.sh,websupport-vps-deployment/docker-compose.yml"
          target: /tmp/jobbie-deploy/

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          BACKEND_VERSION: ${{ needs.test-build-push.outputs.version }}
          GHCR_IMAGE: ${{ needs.test-build-push.outputs.image }}
          GHCR_USER: ${{ steps.ghcr.outputs.user }}
          GHCR_TOKEN: ${{ secrets.PROD_GHCR_TOKEN }}
          HEALTH_URL: ${{ vars.PROD_HEALTH_URL }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: BACKEND_VERSION,GHCR_IMAGE,GHCR_USER,GHCR_TOKEN,HEALTH_URL
          script: |
            set -euo pipefail
            sudo install -m 755 /tmp/jobbie-deploy/websupport-vps-deployment/scripts/deploy_backend.sh \
              /srv/nestjs-typesense/scripts/deploy_backend.sh
            sudo install -m 644 /tmp/jobbie-deploy/websupport-vps-deployment/docker-compose.yml \
              /srv/nestjs-typesense/docker-compose.yml
            export HEALTH_URL="${HEALTH_URL:-https://api.jobbie.sk/health}"
            HEALTH_URL="${HEALTH_URL//$'\r'/}"
            HEALTH_URL="${HEALTH_URL//$'\n'/}"
            sudo \
              BACKEND_VERSION="${BACKEND_VERSION}" \
              GHCR_IMAGE="${GHCR_IMAGE}" \
              GHCR_USER="${GHCR_USER}" \
              GHCR_TOKEN="${GHCR_TOKEN}" \
              HEALTH_URL="${HEALTH_URL}" \
              bash /srv/nestjs-typesense/scripts/deploy_backend.sh
