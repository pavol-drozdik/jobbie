<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prihlásenie — Jobbie</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background-color: #f2faf4;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            font-family: "DM Sans", sans-serif;
        }

        /* ── Card ── */
        .login-card {
            display: flex;
            width: 100%;
            max-width: 1020px;
            min-height: 620px;
            border-radius: 24px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.13);
            overflow: hidden;
        }

        /* ── Left panel ── */
        .login-left {
            width: 42%;
            background: linear-gradient(155deg, rgba(21,128,61,1) 0%, rgba(34,197,94,1) 100%);
            padding: 40px 44px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        /* decorative blobs */
        .login-left::before,
        .login-left::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.07);
        }

        .login-left::before {
            width: 320px;
            height: 320px;
            top: -80px;
            right: -100px;
        }

        .login-left::after {
            width: 200px;
            height: 200px;
            bottom: 40px;
            left: -60px;
        }

        .login-logo {
            font-size: 22px;
            font-weight: 800;
            color: rgba(255,255,255,0.9);
            letter-spacing: -0.5px;
            position: relative;
            z-index: 1;
        }

        .login-left-bottom {
            position: relative;
            z-index: 1;
        }

        .login-tagline {
            font-size: 42px;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.15;
            margin: 0 0 16px;
        }

        .login-sub {
            font-size: 18px;
            font-weight: 500;
            color: rgba(255,255,255,0.75);
            line-height: 1.5;
            margin: 0;
        }

        /* ── Right panel ── */
        .login-right {
            flex: 1;
            background: #ffffff;
            padding: 52px 56px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* ── Heading ── */
        .login-heading {
            font-size: 36px;
            font-weight: 800;
            color: #000;
            margin: 0 0 8px;
            line-height: 1.1;
        }

        .login-heading span { color: #22c55e; }

        .login-desc {
            font-size: 17px;
            font-weight: 400;
            color: rgba(0,0,0,0.55);
            margin: 0 0 36px;
            line-height: 1.5;
        }

        /* ── Form fields ── */
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
        }

        .field-label {
            font-size: 15px;
            font-weight: 600;
            color: #000;
        }

        .field-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .field-input {
            width: 100%;
            height: 54px;
            background: #fafcfb;
            border: 1.5px solid transparent;
            border-radius: 999px;
            padding: 0 50px 0 20px;
            font-family: "DM Sans", sans-serif;
            font-size: 17px;
            font-weight: 400;
            color: #000;
            outline: none;
            transition: border-color 0.2s;
        }

        .field-input::placeholder { color: rgba(0,0,0,0.3); }
        .field-input:focus { border-color: #22c55e; }

        .field-icon {
            position: absolute;
            right: 18px;
            color: rgba(0,0,0,0.3);
            font-size: 16px;
            cursor: pointer;
            transition: color 0.15s;
            background: none;
            border: none;
            padding: 0;
            display: flex;
            align-items: center;
        }

        .field-icon:hover { color: #22c55e; }

        /* ── Password row ── */
        .password-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        /* ── Checkbox ── */
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .checkbox-box {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            border: 1.5px solid #d1d5db;
            background: #fafcfb;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s, border-color 0.2s;
        }

        .checkbox-box i { color: #fff; font-size: 12px; display: none; }

        .checkbox-row.checked .checkbox-box { background: #22c55e; border-color: #22c55e; }
        .checkbox-row.checked .checkbox-box i { display: block; }

        .checkbox-text {
            font-size: 15px;
            font-weight: 500;
            color: rgba(0,0,0,0.65);
        }

        .forgot-link {
            font-size: 15px;
            font-weight: 600;
            color: #22c55e;
            text-decoration: none;
            transition: opacity 0.15s;
        }

        .forgot-link:hover { opacity: 0.75; }

        /* ── Buttons ── */
        .btn-primary {
            width: 100%;
            height: 56px;
            background: #22c55e;
            color: #fff;
            border: none;
            border-radius: 999px;
            font-family: "DM Sans", sans-serif;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-bottom: 16px;
        }

        .btn-primary:hover { opacity: 0.88; }

        /* ── Divider ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(0,0,0,0.1);
        }

        .divider span {
            font-size: 14px;
            font-weight: 500;
            color: rgba(0,0,0,0.35);
            white-space: nowrap;
        }

        /* ── Google button ── */
        .btn-google {
            width: 100%;
            height: 56px;
            background: #ffffff;
            color: #000;
            border: 1.5px solid rgba(0,0,0,0.12);
            border-radius: 999px;
            font-family: "DM Sans", sans-serif;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.15s, border-color 0.15s;
            margin-bottom: 28px;
        }

        .btn-google:hover { background: #fafcfb; border-color: rgba(0,0,0,0.2); }

        .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }

        /* ── Register link ── */
        .register-row {
            text-align: center;
            font-size: 16px;
            font-weight: 500;
            color: rgba(0,0,0,0.5);
        }

        .register-row a {
            color: #22c55e;
            font-weight: 700;
            text-decoration: none;
            transition: opacity 0.15s;
        }

        .register-row a:hover { opacity: 0.75; }

        /* ── Responsive ── */
        @media (max-width: 700px) {
            .login-left { display: none; }
            .login-right { padding: 40px 28px; }
            .login-card { min-height: unset; }
        }
    </style>
</head>
<body>

    <div class="login-card">

        <!-- ── Left ── -->
        <div class="login-left">
            <div class="login-logo">Jobbie</div>
            <div class="login-left-bottom">
                <h2 class="login-tagline">Bez práce<br>nie sú koláče.</h2>
                <p class="login-sub">Nájdi prácu cez Jobbie, rýchlo a bez starostí.</p>
            </div>
        </div>

        <!-- ── Right ── -->
        <div class="login-right">
            <h1 class="login-heading">Vitaj <span>späť</span></h1>
            <p class="login-desc">Zadaj svoj e-mail a heslo aby si sa prihlásil do svojho účtu.</p>

            <form onsubmit="return false">

                <div class="field-group">
                    <label class="field-label">E-mail</label>
                    <div class="field-wrap">
                        <input class="field-input" type="email" placeholder="jan.novak@email.sk">
                        <i class="field-icon fa-regular fa-envelope"></i>
                    </div>
                </div>

                <div class="field-group">
                    <label class="field-label">Heslo</label>
                    <div class="field-wrap">
                        <input class="field-input" type="password" id="password-input" placeholder="Zadaj heslo">
                        <button class="field-icon" type="button" id="toggle-pw" tabindex="-1">
                            <i class="fa-regular fa-eye" id="pw-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="password-meta">
                    <div class="checkbox-row" id="remember-checkbox">
                        <div class="checkbox-box"><i class="fa-solid fa-check"></i></div>
                        <span class="checkbox-text">Zapamätať si ma</span>
                    </div>
                    <a href="#" class="forgot-link">Zabudol som heslo</a>
                </div>

                <button class="btn-primary" type="submit">Prihlásiť sa</button>

                <div class="divider"><span>alebo</span></div>

                <button class="btn-google" type="button">
                    <!-- Google logo SVG -->
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Prihlásiť sa cez Google
                </button>

            </form>

            <p class="register-row">Nemáš ešte účet? <a href="#">Registruj sa</a></p>
        </div>

    </div>

    <script>
        /* ── Show / hide password ── */
        document.getElementById('toggle-pw').addEventListener('click', () => {
            const input = document.getElementById('password-input');
            const eye   = document.getElementById('pw-eye');
            if (input.type === 'password') {
                input.type = 'text';
                eye.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                eye.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });

        /* ── Remember me checkbox ── */
        document.getElementById('remember-checkbox').addEventListener('click', function () {
            this.classList.toggle('checked');
        });
    </script>

</body>
</html>
