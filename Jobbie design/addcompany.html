<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pridať firmu — Jobbie</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <style>
        .addjob-section { padding: 40px 20px 80px; }

        .addjob-form {
            max-width: 860px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .addjob-form > h2 { margin-bottom: 0; }

        .form-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            box-shadow: 0 0 8px rgba(0,0,0,0.08);
        }

        .form-card-title {
            font-family: "DM Sans", sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #000;
            margin: 0 0 4px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-family: "DM Sans", sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: #000;
        }

        .form-input {
            height: 56px;
            background: #fafcfb;
            border: none;
            border-radius: 999px;
            padding: 0 20px;
            font-family: "DM Sans", sans-serif;
            font-size: 18px;
            font-weight: 400;
            color: #000;
            outline: none;
            width: 100%;
        }

        .form-input::placeholder { color: rgba(0,0,0,0.3); }

        /* ── Thumbnail ── */
        .thumbnail-upload {
            position: relative;
            height: 200px;
            background: #fafcfb;
            border: 2px dashed #22c55e;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: background 0.2s;
            overflow: hidden;
        }

        .thumbnail-upload:hover { background: #f0faf4; }

        .thumbnail-upload input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .thumbnail-upload i { font-size: 32px; color: #22c55e; }

        .thumbnail-upload span {
            font-family: "DM Sans", sans-serif;
            font-size: 18px;
            font-weight: 500;
            color: rgba(0,0,0,0.4);
        }

        .thumbnail-upload img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            border-radius: 18px;
        }

        /* ── Dropdown ── */
        .form-dropdown { position: relative; }

        .form-dropdown-trigger {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            background: #fafcfb;
            border-radius: 999px;
            padding: 0 20px;
            cursor: pointer;
            user-select: none;
        }

        .form-dropdown-trigger span {
            font-family: "DM Sans", sans-serif;
            font-size: 18px;
            font-weight: 400;
            color: rgba(0,0,0,0.3);
        }

        .form-dropdown-trigger span.chosen { color: #000; }

        .form-dropdown-trigger i {
            color: rgba(0,0,0,0.3);
            font-size: 13px;
            transition: transform 0.2s;
        }

        .form-dropdown.open .form-dropdown-trigger i { transform: rotate(180deg); }

        .form-dropdown-panel {
            display: none;
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            min-width: 100%;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            z-index: 200;
            padding: 8px;
            max-height: 260px;
            overflow-y: auto;
        }

        .form-dropdown.open .form-dropdown-panel { display: block; }

        .form-dropdown-option {
            padding: 11px 16px;
            border-radius: 10px;
            font-family: "DM Sans", sans-serif;
            font-size: 18px;
            font-weight: 400;
            color: rgba(0,0,0,0.8);
            cursor: pointer;
            transition: background 0.15s;
        }

        .form-dropdown-option:hover { background: #f2faf4; }
        .form-dropdown-option.active { background: #cff0db; font-weight: 600; color: #000; }

        /* ── WYSIWYG ── */
        .wysiwyg-wrap {
            background: #fafcfb;
            border-radius: 20px;
            overflow: hidden;
        }

        .wysiwyg-toolbar {
            display: flex;
            gap: 4px;
            padding: 10px 14px;
            border-bottom: 1px solid rgba(0,0,0,0.07);
            flex-wrap: wrap;
        }

        .wysiwyg-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            color: rgba(0,0,0,0.5);
            transition: background 0.15s, color 0.15s;
        }

        .wysiwyg-btn:hover { background: #cff0db; color: #000; }
        .wysiwyg-btn.active { background: #22c55e; color: #fff; }

        .wysiwyg-divider {
            width: 1px;
            background: rgba(0,0,0,0.1);
            margin: 4px 4px;
            align-self: stretch;
        }

        .wysiwyg-content {
            min-height: 180px;
            padding: 16px 20px;
            font-family: "DM Sans", sans-serif;
            font-size: 18px;
            font-weight: 400;
            color: rgba(0,0,0,0.8);
            outline: none;
            line-height: 1.6;
        }

        .wysiwyg-content:empty::before {
            content: attr(data-placeholder);
            color: rgba(0,0,0,0.3);
            pointer-events: none;
        }

        /* ── Duration slider ── */
        .slider-wrap {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .slider-value-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .slider-value {
            font-family: "DM Sans", sans-serif;
            font-size: 48px;
            font-weight: 800;
            color: #22c55e;
            line-height: 1;
        }

        .slider-unit {
            font-family: "DM Sans", sans-serif;
            font-size: 22px;
            font-weight: 600;
            color: rgba(0,0,0,0.4);
        }

        .slider-track-wrap {
            position: relative;
            height: 40px;
            display: flex;
            align-items: center;
        }

        input[type="range"].duration-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 999px;
            background: #e5e7eb;
            outline: none;
            cursor: pointer;
        }

        input[type="range"].duration-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #22c55e;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(34,197,94,0.4);
            transition: transform 0.15s;
        }

        input[type="range"].duration-slider::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        input[type="range"].duration-slider::-moz-range-thumb {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #22c55e;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(34,197,94,0.4);
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
        }

        .slider-labels span {
            font-family: "DM Sans", sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: rgba(0,0,0,0.3);
        }

        /* ── Submit ── */
        .addjob-submit {
            height: 64px;
            background: #22c55e;
            color: #fff;
            border: none;
            border-radius: 999px;
            font-family: "DM Sans", sans-serif;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            width: 100%;
        }

        .addjob-submit:hover { opacity: 0.88; }

        @media (max-width: 640px) {
            .form-card { padding: 20px; }
        }
    </style>
</head>
<body>
    <header>
        <div>
            <img>
            <nav>
                <span>Domov</span>
                <span>Pozrieť ponuky</span>
                <span>Hľadať firmy</span>
            </nav>
            <nav>
                <button>Registrovať sa</button>
                <button>Prihlásiť sa</button>
            </nav>
        </div>
    </header>

    <section class="addjob-section">
        <form class="addjob-form" id="addcompany-form" onsubmit="return false">
            <h2>Nová firma</h2>

            <!-- ── Thumbnail ── -->
            <div class="form-card">
                <p class="form-card-title">Logo / Thumbnail</p>
                <div class="thumbnail-upload" id="thumbnail-drop">
                    <input type="file" id="thumbnail-input" accept="image/*">
                    <i class="fa-solid fa-image"></i>
                    <span>Klikni alebo pretiahni obrázok</span>
                    <img id="thumbnail-preview">
                </div>
            </div>

            <!-- ── Obsah ── -->
            <div class="form-card">
                <p class="form-card-title">Informácie</p>

                <div class="form-group">
                    <label class="form-label">Názov firmy</label>
                    <input type="text" class="form-input" placeholder="Napr. Stavebná firma Novák s.r.o.">
                </div>

                <div class="form-group">
                    <label class="form-label">Kategória</label>
                    <div class="form-dropdown" id="category-dropdown">
                        <div class="form-dropdown-trigger">
                            <span id="category-label">Vyberte kategóriu</span>
                            <i class="fa-solid fa-chevron-down"></i>
                        </div>
                        <div class="form-dropdown-panel">
                            <div class="form-dropdown-option">Stavba</div>
                            <div class="form-dropdown-option">Upratovanie</div>
                            <div class="form-dropdown-option">Záhrada</div>
                            <div class="form-dropdown-option">Doprava &amp; Logistika</div>
                            <div class="form-dropdown-option">Skladovanie</div>
                            <div class="form-dropdown-option">Gastronómia</div>
                            <div class="form-dropdown-option">Administratíva</div>
                            <div class="form-dropdown-option">IT &amp; Technika</div>
                            <div class="form-dropdown-option">Obchod &amp; Predaj</div>
                            <div class="form-dropdown-option">Iné</div>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Popis</label>
                    <div class="wysiwyg-wrap">
                        <div class="wysiwyg-toolbar">
                            <button type="button" class="wysiwyg-btn" data-cmd="bold"><i class="fa-solid fa-bold"></i></button>
                            <button type="button" class="wysiwyg-btn" data-cmd="italic"><i class="fa-solid fa-italic"></i></button>
                            <button type="button" class="wysiwyg-btn" data-cmd="underline"><i class="fa-solid fa-underline"></i></button>
                            <button type="button" class="wysiwyg-btn" data-cmd="strikeThrough"><i class="fa-solid fa-strikethrough"></i></button>
                            <div class="wysiwyg-divider"></div>
                            <button type="button" class="wysiwyg-btn" data-cmd="insertUnorderedList"><i class="fa-solid fa-list-ul"></i></button>
                            <button type="button" class="wysiwyg-btn" data-cmd="insertOrderedList"><i class="fa-solid fa-list-ol"></i></button>
                            <div class="wysiwyg-divider"></div>
                            <button type="button" class="wysiwyg-btn" data-cmd="justifyLeft"><i class="fa-solid fa-align-left"></i></button>
                            <button type="button" class="wysiwyg-btn" data-cmd="justifyCenter"><i class="fa-solid fa-align-center"></i></button>
                            <button type="button" class="wysiwyg-btn" data-cmd="justifyRight"><i class="fa-solid fa-align-right"></i></button>
                        </div>
                        <div class="wysiwyg-content" contenteditable="true" data-placeholder="Popíšte firmu, čo robí, aké má hodnoty..."></div>
                    </div>
                </div>
            </div>

            <!-- ── Trvanie inzerátu ── -->
            <div class="form-card">
                <p class="form-card-title">Trvanie inzerátu</p>
                <div class="slider-wrap">
                    <div class="slider-value-row">
                        <span class="slider-value" id="slider-display">3</span>
                        <span class="slider-unit">mesiace</span>
                    </div>
                    <div class="slider-track-wrap">
                        <input type="range" class="duration-slider" id="duration-slider" min="1" max="12" value="3" step="1">
                    </div>
                    <div class="slider-labels">
                        <span>1 mesiac</span>
                        <span>12 mesiacov</span>
                    </div>
                </div>
            </div>

            <button type="submit" class="addjob-submit">Zverejniť firmu</button>
        </form>
    </section>

    <script>
        /* ── Thumbnail ── */
        document.getElementById('thumbnail-input').addEventListener('change', function () {
            const file = this.files[0];
            if (!file) return;
            const preview = document.getElementById('thumbnail-preview');
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
            document.querySelector('#thumbnail-drop i').style.display = 'none';
            document.querySelector('#thumbnail-drop span').style.display = 'none';
        });

        /* ── Category dropdown ── */
        const categoryDropdown = document.getElementById('category-dropdown');
        const categoryLabel    = document.getElementById('category-label');

        categoryDropdown.querySelector('.form-dropdown-trigger').addEventListener('click', e => {
            e.stopPropagation();
            categoryDropdown.classList.toggle('open');
        });

        categoryDropdown.querySelectorAll('.form-dropdown-option').forEach(opt => {
            opt.addEventListener('click', () => {
                categoryDropdown.querySelectorAll('.form-dropdown-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                categoryLabel.textContent = opt.textContent;
                categoryLabel.classList.add('chosen');
                categoryDropdown.classList.remove('open');
            });
        });

        document.addEventListener('click', () => {
            document.querySelectorAll('.form-dropdown.open').forEach(d => d.classList.remove('open'));
        });

        /* ── WYSIWYG ── */
        const editor = document.querySelector('.wysiwyg-content');

        document.querySelectorAll('.wysiwyg-btn').forEach(btn => {
            btn.addEventListener('mousedown', e => {
                e.preventDefault();
                document.execCommand(btn.dataset.cmd, false, null);
                editor.focus();
            });
        });

        editor.addEventListener('keyup', updateToolbar);
        editor.addEventListener('mouseup', updateToolbar);

        function updateToolbar() {
            document.querySelectorAll('.wysiwyg-btn').forEach(btn => {
                btn.classList.toggle('active', document.queryCommandState(btn.dataset.cmd));
            });
        }

        /* ── Duration slider ── */
        const slider  = document.getElementById('duration-slider');
        const display = document.getElementById('slider-display');
        const unit    = document.querySelector('.slider-unit');

        const labels = ['mesiac','mesiace','mesiace','mesiace','mesiacov','mesiacov','mesiacov','mesiacov','mesiacov','mesiacov','mesiacov','mesiacov'];

        function updateSlider() {
            const val = parseInt(slider.value);
            display.textContent = val;
            unit.textContent = labels[val - 1];

            const pct = (val - 1) / (slider.max - slider.min) * 100;
            slider.style.background = `linear-gradient(to right, #22c55e ${pct}%, #e5e7eb ${pct}%)`;
        }

        slider.addEventListener('input', updateSlider);
        updateSlider();
    </script>
</body>
</html>
