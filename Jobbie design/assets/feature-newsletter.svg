<svg width="560" height="320" viewBox="0 0 560 320" xmlns="http://www.w3.org/2000/svg" font-family="'DM Sans', Arial, sans-serif">
  <defs>
    <filter id="s3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="560" height="320" rx="24" fill="#f0faf4"/>
  <circle cx="520" cy="-40" r="180" fill="#22c55e" opacity="0.07"/>
  <circle cx="0" cy="320" r="120" fill="#22c55e" opacity="0.05"/>

  <!-- ── Notification Card 1 ── -->
  <rect x="60" y="42" width="440" height="84" rx="16" fill="white" filter="url(#s3)"/>
  <!-- Icon bg - envelope green -->
  <rect x="80" y="58" width="48" height="48" rx="12" fill="#cff0db"/>
  <!-- Envelope icon -->
  <rect x="88" y="68" width="32" height="22" rx="3" fill="none" stroke="#22c55e" stroke-width="2"/>
  <path d="M88 68 l16 12 l16-12" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>
  <!-- Text -->
  <text x="144" y="77" font-size="15" font-weight="700" fill="#000">Nový článok: Kariéra</text>
  <text x="144" y="97" font-size="13" fill="rgba(0,0,0,0.4)">Práve dorazil do vašej schránky</text>
  <!-- Green dot badge -->
  <circle cx="466" cy="68" r="8" fill="#22c55e"/>
  <text x="466" y="72" text-anchor="middle" font-size="10" font-weight="800" fill="white">1</text>

  <!-- ── Notification Card 2 ── -->
  <rect x="60" y="146" width="440" height="84" rx="16" fill="white" filter="url(#s3)"/>
  <!-- Icon bg - briefcase -->
  <rect x="80" y="162" width="48" height="48" rx="12" fill="#cff0db"/>
  <!-- Briefcase icon -->
  <rect x="88" y="172" width="32" height="22" rx="3" fill="none" stroke="#22c55e" stroke-width="2"/>
  <path d="M96 172 v-4 a2 2 0 0 1 2-2 h8 a2 2 0 0 1 2 2 v4" fill="none" stroke="#22c55e" stroke-width="2"/>
  <line x1="88" y1="183" x2="120" y2="183" stroke="#22c55e" stroke-width="2"/>
  <!-- Text -->
  <text x="144" y="181" font-size="15" font-weight="700" fill="#000">3 nové brigády v Žiline</text>
  <text x="144" y="201" font-size="13" fill="rgba(0,0,0,0.4)">Zodpovedajú vašim preferenciám</text>
  <!-- Green dot badge -->
  <circle cx="466" cy="172" r="8" fill="#22c55e"/>
  <text x="466" y="176" text-anchor="middle" font-size="10" font-weight="800" fill="white">3</text>

  <!-- ── Bottom tag ── -->
  <rect x="172" y="254" width="216" height="42" rx="21" fill="#22c55e"/>
  <text x="280" y="280" text-anchor="middle" font-size="15" font-weight="700" fill="white">Odoberať novinky zadarmo</text>
</svg>
