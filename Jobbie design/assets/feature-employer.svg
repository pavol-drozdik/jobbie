<svg width="560" height="380" viewBox="0 0 560 380" xmlns="http://www.w3.org/2000/svg" font-family="'DM Sans', Arial, sans-serif">
  <defs>
    <filter id="s2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="560" height="380" rx="24" fill="#f0faf4"/>
  <circle cx="-20" cy="-20" r="180" fill="#22c55e" opacity="0.06"/>
  <circle cx="580" cy="360" r="140" fill="#22c55e" opacity="0.05"/>

  <!-- ── Candidate Card 1 ── -->
  <rect x="60" y="36" width="440" height="86" rx="16" fill="white" filter="url(#s2)"/>
  <!-- Avatar circle - purple -->
  <circle cx="106" cy="79" r="26" fill="#7c3aed"/>
  <text x="106" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="white">JN</text>
  <!-- Name + meta -->
  <text x="148" y="67" font-size="16" font-weight="800" fill="#000">Jana Nováková</text>
  <circle cx="150" cy="83" r="3" fill="#22c55e"/>
  <text x="158" y="87" font-size="13" fill="rgba(0,0,0,0.4)">Žilina · Stavba · ★ 4.9</text>
  <!-- Status pill -->
  <rect x="384" y="68" width="90" height="28" rx="14" fill="#f0fdf4"/>
  <circle cx="401" cy="82" r="4" fill="#22c55e"/>
  <text x="410" y="87" font-size="13" font-weight="700" fill="#15803d">Dostupná</text>

  <!-- ── Candidate Card 2 ── -->
  <rect x="60" y="140" width="440" height="86" rx="16" fill="white" filter="url(#s2)"/>
  <!-- Avatar - amber -->
  <circle cx="106" cy="183" r="26" fill="#d97706"/>
  <text x="106" y="189" text-anchor="middle" font-size="14" font-weight="700" fill="white">TK</text>
  <!-- Name + meta -->
  <text x="148" y="171" font-size="16" font-weight="800" fill="#000">Tomáš Kováč</text>
  <circle cx="150" cy="187" r="3" fill="#22c55e"/>
  <text x="158" y="191" font-size="13" fill="rgba(0,0,0,0.4)">Martin · Doprava · ★ 4.7</text>
  <!-- Status pill -->
  <rect x="384" y="172" width="90" height="28" rx="14" fill="#fffbeb"/>
  <circle cx="401" cy="186" r="4" fill="#d97706"/>
  <text x="410" y="191" font-size="13" font-weight="700" fill="#d97706">Dostupný</text>

  <!-- ── Stat row ── -->
  <rect x="60" y="252" width="206" height="90" rx="14" fill="#22c55e"/>
  <rect x="294" y="252" width="206" height="90" rx="14" fill="#cff0db"/>
  <!-- Stat 1 -->
  <text x="82" y="295" font-size="28" font-weight="800" fill="white">500+</text>
  <text x="82" y="320" font-size="13" fill="rgba(255,255,255,0.8)">firiem nám dôveruje</text>
  <!-- Stat 2 -->
  <text x="316" y="295" font-size="28" font-weight="800" fill="#15803d">2 dni</text>
  <text x="316" y="320" font-size="13" fill="rgba(21,128,61,0.7)">obsadenie pozície</text>
</svg>
