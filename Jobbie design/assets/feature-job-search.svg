  <rect x="99" y="135" width="6" height="8" rx="1" fill="#22c55e"/>
  <path d="M94 148 l16 0 l-3 6 l-10 0 z" fill="#22c55e" opacity="0.6"/>
  <!-- Title -->
  <text x="138" y="147" font-size="15" font-weight="700" fill="#000">Kosenie trávnika</text>
