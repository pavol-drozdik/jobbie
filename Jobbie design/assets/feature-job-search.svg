  <!-- Stat 1 -->
  <text x="82" y="338" font-size="26" font-weight="800" fill="white">1 200+</text>
  <text x="82" y="360" font-size="13" fill="rgba(255,255,255,0.8)">brigád online</text>
  <!-- Stat 2 -->
