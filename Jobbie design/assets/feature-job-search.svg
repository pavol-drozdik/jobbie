  <path d="M461 64h14M469 58l6 6-6 6" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── Card 1 ── -->
  <rect x="60" y="112" width="440" height="76" rx="16" fill="white" filter="url(#s1)"/>
  <!-- Icon bg -->
