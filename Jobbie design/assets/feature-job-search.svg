  <path d="M92 248 l8-8 l12 4 l-8 10 z" fill="#22c55e" opacity="0.7"/>
  <!-- Title -->
  <text x="138" y="241" font-size="15" font-weight="700" fill="#000">Upratovanie kancelárií</text>
