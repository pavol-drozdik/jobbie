<svg width="560" height="420" viewBox="0 0 560 420" xmlns="http://www.w3.org/2000/svg" font-family="'DM Sans', Arial, sans-serif">
  <defs>
    <filter id="s1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.07"/>
    </filter>
    <clipPath id="bg-clip">
      <rect width="560" height="420" rx="24"/>
