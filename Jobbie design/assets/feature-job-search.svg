  <circle cx="-30" cy="390" r="120" fill="#22c55e" opacity="0.05"/>

  <!-- ── Search bar ── -->
  <rect x="60" y="36" width="440" height="56" rx="28" fill="white" filter="url(#s1)"/>
  <!-- Search icon -->
  <circle cx="93" cy="64" r="9" fill="none" stroke="#22c55e" stroke-width="2.2"/>
  <line x1="99" y1="70" x2="106" y2="77" stroke="#22c55e" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Placeholder text -->
  <text x="120" y="69" font-size="14" fill="rgba(0,0,0,0.32)" font-weight="400">Kosenie trávnika, Žilina...</text>
  <!-- Arrow button -->
