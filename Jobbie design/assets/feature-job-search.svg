  <text x="148" y="167" font-size="13" fill="rgba(0,0,0,0.4)">Žilina · 16.–18. 05. 2026</text>
  <!-- Salary -->
  <text x="482" y="153" font-size="14" font-weight="800" fill="#22c55e" text-anchor="end">7,00 €/h</text>

  <!-- ── Card 2 ── -->
  <rect x="60" y="206" width="440" height="76" rx="16" fill="white" filter="url(#s1)"/>
  <!-- Icon bg -->
  <rect x="80" y="222" width="44" height="44" rx="10" fill="#cff0db"/>
